<div class="hero-scene-1 text-center text-white">
  <div class="hero-scene-content">
    <p>Trouvez votre prochain voyage avec</p>
    <h1>EcoRide</h1>
  </div>
</div>

<form>
  <div class="container p-4">
    <h2 class="text-center text-primary">Rechercher un trajet</h2>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="departure" class="form-label">Départ 📍</label>
        <input
          type="text"
          class="form-control"
          id="departure"
          placeholder="Ville de départ"
        />
      </div>

      <div class="col-md-6 mb-3">
        <label for="destination" class="form-label">Destination 📍</label>
        <input
          type="text"
          class="form-control"
          id="destination"
          placeholder="Ville de destination"
        />
      </div>

      <div class="col-md-6 mb-3">
        <label for="voyageurs" class="form-label">Nombres de voyageurs</label>
        <input
          type="number"
          class="form-control"
          id="voyageurs"
          placeholder="Nombre de voyageurs"
        />
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="date" class="form-label">Date de départ</label>
        <input type="date" class="form-control" id="date" />
      </div>
      <div class="col-md-6 mb-3">
        <label for="time" class="form-label">Heure de départ</label>
        <input type="time" class="form-control" id="time" />
      </div>
      <div class="col-md-6 mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="ecologiqueCheck" />
        <label class="form-check-label" for="exampleCheck1"
          >Voyage écologique 🌱</label
        >
      </div>
      <div class="col-md-6 mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="VoirTousCheck" />
        <label class="form-check-label" for="exampleCheck1"
          >Voir tous les trajets</label
        >
      </div>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-primary">Rechercher</button>
    </div>
  </div>
</form>
